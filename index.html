<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REAL SENSI ULTRA GOLD CYBER V27</title>

<style>

:root{
--gold:#ffd700;
--gold2:#ff9800;
--neon:#8b0000;
--bg:#050505;
--red:#ff3b3b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:
radial-gradient(circle at center,#1a0000 0%,#000 75%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
color:#fff;
}

.entry{
display:flex;
flex-direction:column;
align-items:center;
padding:40px 20px;
width:100%;
}

.logo{

font-size:78px;
font-weight:900;

background:
linear-gradient(
180deg,
#fff9c4,
#ffd700,
#ff9800,
#8b0000
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

filter:
drop-shadow(0 0 10px #ffd700)
drop-shadow(0 0 25px #ff9800)
drop-shadow(0 0 40px #8b0000);

animation:pulse 1.8s infinite alternate;

text-align:center;

}

@keyframes pulse{
100%{
transform:scale(1.03);
}
}

.sub{

margin-top:12px;

font-size:18px;
font-weight:900;

letter-spacing:4px;

color:#8b0000;

text-shadow:0 0 15px #8b0000;

}

input,
select{

width:100%;
height:76px;

margin-top:22px;

padding:0 20px;

border-radius:24px;

border:2px solid rgba(139,0,0,.2);

background:#080808;

color:#fff;

font-size:22px;
font-weight:800;

outline:none;

text-align:center;

transition:.25s;

box-shadow:
0 0 18px rgba(139,0,0,.2);

}

input:focus,
select:focus{

border-color:#8b0000;

box-shadow:
0 0 30px rgba(139,0,0,.5);

transform:scale(1.01);

}

.enter,
.btn{

width:100%;
height:88px;

margin-top:35px;

border:none;
border-radius:28px;

font-size:32px;
font-weight:900;

cursor:pointer;

color:#fff;

background:
linear-gradient(
135deg,
#ffd700,
#ff9800,
#8b0000
);

box-shadow:
0 0 15px #ffd700,
0 0 30px #ff9800,
0 0 50px #8b0000;

transition:.25s;

}

.enter:hover,
.btn:hover{
transform:scale(1.03);
}

.erro{

display:none;

margin-top:14px;

font-size:18px;
font-weight:800;

color:#ff3b3b;

text-shadow:0 0 12px #ff3b3b;

}

.container{
display:none;
width:100%;
max-width:700px;
}

.card{

padding:45px 35px;

border-radius:35px;

background:
linear-gradient(
180deg,
rgba(139,0,0,.08),
rgba(255,145,0,.03)
);

border:
1px solid rgba(139,0,0,.25);

backdrop-filter:blur(15px);

box-shadow:
0 0 30px rgba(139,0,0,.2);

}

.title{

font-size:40px;
font-weight:900;

text-align:center;

margin-bottom:30px;

color:#8b0000;

text-shadow:
0 0 12px #8b0000,
0 0 30px #ffd700;

}

#loader{
display:none;
margin-top:30px;
text-align:center;
}

.scan-box{

width:100%;
height:26px;

margin-top:20px;

background:#111;

border-radius:30px;

overflow:hidden;

border:1px solid rgba(139,0,0,.3);

}

.scan-fill{

width:0%;
height:100%;

background:
linear-gradient(
90deg,
#ffd700,
#ff9800,
#8b0000
);

box-shadow:
0 0 20px #8b0000;

transition:.2s;

}

#result{
display:none;
margin-top:30px;
}

.sensi-box{

padding:30px;

border-radius:30px;

background:
linear-gradient(
180deg,
rgba(139,0,0,.08),
rgba(255,145,0,.03)
);

border:
1px solid rgba(139,0,0,.2);

}

.sensi-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.sensi-title{
font-size:28px;
font-weight:900;
color:#8b0000;
}

.sensi-badge{

padding:10px 20px;

border-radius:15px;

background:
linear-gradient(
135deg,
#ffd700,
#8b0000
);

font-size:18px;
font-weight:900;

color:#fff;

}

.sensi-item{
margin-top:22px;
}

.sensi-info{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.sensi-name{
font-size:18px;
font-weight:800;
}

.sensi-number{
font-size:22px;
font-weight:900;
color:#8b0000;
}

.sensi-bar{

width:100%;
height:18px;

background:#111;

border-radius:30px;

overflow:hidden;

}

.sensi-fill{

height:100%;

border-radius:30px;

background:
linear-gradient(
90deg,
#ffd700,
#ff9800,
#8b0000
);

box-shadow:
0 0 15px #8b0000;

}

.fire-box{

margin-top:30px;

padding:30px;

border-radius:25px;

text-align:center;

background:
linear-gradient(
135deg,
rgba(139,0,0,.15),
rgba(255,145,0,.08)
);

border:
1px solid rgba(139,0,0,.2);

}

.fire-number{

font-size:70px;
font-weight:900;

color:#8b0000;

text-shadow:
0 0 15px #8b0000,
0 0 35px #ffd700;

}

.fire-text{

margin-top:10px;

font-size:20px;
font-weight:900;

letter-spacing:2px;

}

.dpi-result{

margin-top:22px;

padding:18px;

border-radius:18px;

background:
rgba(139,0,0,.1);

text-align:center;

font-size:22px;
font-weight:900;

color:#8b0000;

border:
1px solid rgba(139,0,0,.25);

}

.ai-msg{

margin-top:22px;

padding:18px;

border-radius:18px;

background:
linear-gradient(
135deg,
#ffd700,
#8b0000
);

color:#fff;

font-size:20px;
font-weight:900;

text-align:center;

box-shadow:
0 0 25px #8b0000;

}

@media(max-width:700px){

.logo{
font-size:50px;
}

.card{
padding:35px 22px;
}

.title{
font-size:30px;
}

input,
select{
height:68px;
font-size:20px;
}

.enter,
.btn{
height:80px;
font-size:28px;
}

.fire-number{
font-size:56px;
}

}

</style>
</head>
<body>

<div class="entry">

<div class="logo">
REAL SENSI
</div>

<div class="sub">
ULTRA GOLD CYBER V27
</div>

<input
type="password"
id="senha"
placeholder="DIGITE A SENHA"
>

<div
id="erro"
class="erro"
>
SENHA INCORRETA
</div>

<button
class="enter"
onclick="abrirPainel()"
>
⚡ ENTRAR
</button>

</div>

<div class="container">

<div class="card">

<div class="title">
⚡ IA CALCULADORA DE CAPA
</div>

<input
id="marca"
placeholder="MARCA DO CELULAR"
>

<input
id="modelo"
placeholder="MODELO"
>

<input
id="famoso"
placeholder="INFLUENCIADOR"
>

<select id="tipo">

<option>BAIXA</option>
<option selected>MEDIA</option>
<option>ALTA</option>

</select>

<select id="modo">

<option selected>NORMAL</option>
<option>LENDA</option>
<option>PROIBIDA</option>

</select>

<select id="calibragem">

<option>CALIBRADA</option>
<option selected>PRO</option>
<option>ULTRA PRO</option>

</select>

<select
id="usarDpi"
onchange="toggleDpi()"
>

<option>OFF</option>
<option>ON</option>

</select>

<div
id="dpiField"
style="display:none;"
>

<input
id="dpi"
type="number"
placeholder="DPI"
>

</div>

<button
class="btn"
onclick="processar()"
>
⚡ GERAR SENSI
</button>

<div id="loader">

<h2 id="armaNome">
ESCANEANDO
</h2>

<div class="scan-box">

<div
class="scan-fill"
id="scanFill"
></div>

</div>

<h2 style="margin-top:10px;" id="scanPercent">
0%
</h2>

</div>

<div id="result">

<div id="cards"></div>

</div>

</div>

</div>

<script>

const scans=[

"MP40 PREDADORA",
"M1014 EVO",
"AK DRAGÃO",
"UMP BOOYAH",
"SCAR TITAN",
"M1887 ONE PUNCH",
"XM8 OURO",
"AWM INFERNAL"

];

function abrirPainel(){

const senha =
document.getElementById("senha").value;

if(senha !== "RS_sensi"){

document.getElementById("erro")
.style.display="block";

navigator.vibrate?.(200);

return;

}

document.querySelector(".entry")
.style.display="none";

document.querySelector(".container")
.style.display="block";

}

function toggleDpi(){

const usar=
document.getElementById("usarDpi").value;

document.getElementById("dpiField")
.style.display=
usar==="ON"
?"block"
:"none";

}

function processar(){

document.getElementById("loader")
.style.display="block";

document.getElementById("result")
.style.display="none";

let percent=0;

const arma=
document.getElementById("armaNome");

const fill=
document.getElementById("scanFill");

const scan=
document.getElementById("scanPercent");

let troca=
setInterval(()=>{

arma.innerText=
"ESCANEANDO : "+
scans[
Math.floor(
Math.random()*scans.length
)
];

},180);

let barra=
setInterval(()=>{

percent+=4;

if(percent>100){
percent=100;
}

scan.innerText=
percent+"%";

fill.style.width=
percent+"%";

},100);

setTimeout(()=>{

clearInterval(troca);
clearInterval(barra);

document.getElementById("loader")
.style.display="none";

gerar();

},2600);

}

function criarBarra(nome,valor){

let largura =
(valor / 200) * 100;

return`

<div class="sensi-item">

<div class="sensi-info">

<div class="sensi-name">
${nome}
</div>

<div class="sensi-number">
${valor}
</div>

</div>

<div class="sensi-bar">

<div
class="sensi-fill"
style="width:${largura}%"
></div>

</div>

</div>

`;

}

function gerar(){

const tipo =
document.getElementById("tipo").value;

const dpi =
Number(
document.getElementById("dpi").value || 450
);

const marca =
document.getElementById("marca").value.toLowerCase();

const modelo =
document.getElementById("modelo").value.toLowerCase();

const famoso =
document.getElementById("famoso").value.toLowerCase();

const modo =
document.getElementById("modo").value;

const calibragem =
document.getElementById("calibragem").value;

/* ===================================
ENGINE REAL SENSI V27
=================================== */

let baseDpi = dpi;

if(baseDpi <= 300){
baseDpi = 300;
}

if(baseDpi >= 800){
baseDpi = 800;
}

let potencia = 1.00;

/* TIPO */

if(tipo==="BAIXA"){
potencia += 0.02;
}

if(tipo==="MEDIA"){
potencia += 0.08;
}

if(tipo==="ALTA"){
potencia += 0.15;
}

/* MODO */

if(modo==="LENDA"){
potencia += 0.05;
}

if(modo==="PROIBIDA"){
potencia += 0.11;
}

/* CALIBRAGEM */

if(calibragem==="PRO"){
potencia += 0.04;
}

if(calibragem==="ULTRA PRO"){
potencia += 0.08;
}

/* MARCAS */

if(marca.includes("xiaomi")){
potencia += 0.03;
}

if(marca.includes("iphone")){
potencia += 0.06;
}

if(marca.includes("samsung")){
potencia += 0.02;
}

if(marca.includes("motorola")){
potencia += 0.01;
}

/* MODELOS */

if(modelo.includes("redmi")){
potencia += 0.02;
}

if(modelo.includes("poco")){
potencia += 0.04;
}

if(modelo.includes("moto g")){
potencia -= 0.01;
}

if(modelo.includes("a03")){
potencia -= 0.03;
}

/* INFLUENCIADOR */

if(famoso.includes("nobru")){
potencia += 0.02;
}

if(famoso.includes("two9")){
potencia += 0.03;
}

if(famoso.includes("cerol")){
potencia += 0.01;
}

/* ===================================
SENSI REAL CALCULADA
=================================== */

let geral =
Math.round(
74 +
(baseDpi * 0.045) +
((potencia - 1) * 65)
);

let red =
Math.round(
82 +
(baseDpi * 0.050) +
((potencia - 1) * 72)
);

let mira2 =
Math.round(
red * 0.87
);

let mira4 =
Math.round(
mira2 * 0.79
);

let awm =
Math.round(
38 +
(baseDpi * 0.018) +
((potencia - 1) * 40)
);

let livre =
Math.round(
63 +
(baseDpi * 0.020) +
((potencia - 1) * 35)
);

let botao =
Math.round(
26 +
(baseDpi * 0.010) +
((potencia - 1) * 18)
);

/* LIMITES */

if(red > 150){
red = 150;
}

if(mira2 > 135){
mira2 = 135;
}

if(mira4 > 120){
mira4 = 120;
}

if(botao > 52){
botao = 52;
}

const valores = {
geral,
red,
mira2,
mira4,
awm,
livre,
botao
};

Object.keys(valores).forEach(k=>{

if(valores[k] > 200){
valores[k] = 200;
}

if(valores[k] < 0){
valores[k] = 0;
}

});

document.getElementById("cards")
.innerHTML=

`

<div class="sensi-box">

<div class="sensi-top">

<div class="sensi-title">
IA CALCULADA
</div>

<div class="sensi-badge">
🔥 ${modo}
</div>

</div>

${criarBarra("GERAL",valores.geral)}

${criarBarra("PONTO VERMELHO",valores.red)}

${criarBarra("MIRA 2X",valores.mira2)}

${criarBarra("MIRA 4X",valores.mira4)}

${criarBarra("AWM",valores.awm)}

${criarBarra("OLHADINHA",valores.livre)}

<div class="fire-box">

<div class="fire-number">
${valores.botao}
</div>

<div class="fire-text">
BOTÃO ULTRA CAPA
</div>

</div>

<div class="dpi-result">
⚡ DPI CALCULADA : ${dpi}
</div>

<div class="ai-msg">
🔥 IA MATEMÁTICA • SEM NÚMEROS ALEATÓRIOS
</div>

</div>

`;

document.getElementById("result")
.style.display="block";

}

</script>
</body>
  </html>.
